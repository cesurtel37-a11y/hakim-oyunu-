<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hakim Simülatörü</title>
    <style>
        /* CSS TASARIMI */
        body {
            margin: 0;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 600px;
            perspective: 1200px; /* 3D derinlik hissi */
        }

        /* 3D Mahkeme Salonu */
        .scene {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            position: absolute;
        }

        .courtroom {
            position: relative;
            width: 100%;
            height: 100%;
            transform: rotateX(8deg);
            transform-style: preserve-3d;
        }

        .wall {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #3e2723, #1b1b1b);
            transform: translateZ(-300px);
            border-bottom: 10px solid #2d1d1a;
        }

        .floor {
            position: absolute;
            width: 200%;
            height: 1000px;
            background: #252525;
            left: -50%;
            bottom: -500px;
            transform: rotateX(90deg);
            background-image: radial-gradient(#333 10%, transparent 11%);
            background-size: 30px 30px;
        }

        /* Hakim Masası */
        .desk {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 180px;
            transform-style: preserve-3d;
        }

        .desk-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #5d4037;
            border: 8px solid #3e2723;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .desk-front::after {
            content: "ADALET MÜLKÜN TEMELİDİR";
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .desk-top {
            position: absolute;
            width: 100%;
            height: 120px;
            background: #795548;
            transform: rotateX(90deg) translateZ(60px);
            top: -60px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        /* Arayüz Tabakası */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .case-card {
            margin-top: 40px;
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            pointer-events: auto;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .case-card h2 { margin-top: 0; color: #5d4037; }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        .btn-guilty { background: #c62828; box-shadow: 0 4px #8a1c1c; }
        .btn-innocent { background: #2e7d32; box-shadow: 0 4px #1b4d1f; }

        .gavel {
            font-size: 100px;
            position: absolute;
            bottom: 150px;
            right: 100px;
            opacity: 0;
            pointer-events: none;
            transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
        }

        .verdict-text {
            font-size: 60px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 4px 4px 0px #000;
            margin-top: 20px;
            opacity: 0;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="scene">
            <div class="courtroom">
                <div class="wall"></div>
                <div class="floor"></div>
                
                <div class="desk">
                    <div class="desk-front"></div>
                    <div class="desk-top"></div>
                </div>
            </div>
        </div>

        <div class="ui-layer">
            <div class="case-card" id="caseCard">
                <h2 id="caseTitle">Dava #001</h2>
                <p id="caseDescription">Sanık, mahalledeki tüm dondurmaların tadına bakıp geri koymakla suçlanıyor.</p>
                <div class="btn-group">
                    <button class="btn btn-guilty" onclick="decide('SUÇLU')">SUÇLU</button>
                    <button class="btn btn-innocent" onclick="decide('SUÇSUZ')">SUÇSUZ</button>
                </div>
            </div>
            
            <div id="verdictText" class="verdict-text"></div>
            <div id="gavel" class="gavel">🔨</div>
        </div>
    </div>

    <script>
        // OYUN MANTIĞI
        const cases = [
            { title: "Dava #102", text: "Sanık, arkadaşının oyun karakterini 'yanlışlıkla' sildiğini iddia ediyor." },
            { title: "Dava #205", text: "Bir kedi, gece saat 3'te evde koşu yaparak huzuru bozmakla suçlanıyor." },
            { title: "Dava #044", text: "Sanık, pizza üzerine ananas koyarak toplumu infiale sürüklemiştir." },
            { title: "Dava #309", text: "Bir robot, 'insan gibi hissettiği' için işe gitmeyi reddediyor." },
            { title: "Dava #007", text: "Sanık, kütüphanede çok yüksek sesle cips yemekle suçlanıyor." }
        ];

        let currentCaseIndex = 0;

        function decide(decision) {
            const gavel = document.getElementById('gavel');
            const verdict = document.getElementById('verdictText');
            const card = document.getElementById('caseCard');

            // Tokmak Vurma Efekti
            gavel.style.opacity = "1";
            gavel.style.transform = "rotate(-45deg) scale(1.3)";
            
            setTimeout(() => {
                gavel.style.transform = "rotate(0deg) scale(1)";
                
                // Karar Yazısı
                verdict.innerText = decision;
                verdict.style.opacity = "1";
                verdict.style.transform = "scale(1.2)";

                // Kartı Ekrandan At
                card.style.transform = "translateY(-600px) rotate(15deg)";
                card.style.opacity = "0";

                // Sonraki Davaya Geç
                setTimeout(nextCase, 1200);
            }, 150);
        }

        function nextCase() {
            const card = document.getElementById('caseCard');
            const verdict = document.getElementById('verdictText');
            const gavel = document.getElementById('gavel');
            
            currentCaseIndex = (currentCaseIndex + 1) % cases.length;
            const data = cases[currentCaseIndex];

            // İçeriği Güncelle
            document.getElementById('caseTitle').innerText = data.title;
            document.getElementById('caseDescription').innerText = data.text;

            // Görseli Sıfırla
            verdict.style.opacity = "0";
            gavel.style.opacity = "0";
            card.style.transform = "translateY(0) rotate(0deg)";
            card.style.opacity = "1";
        }
    </script>
</body>
</html>
