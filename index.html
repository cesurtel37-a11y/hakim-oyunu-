<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Pro Ceza Hakimi Simülatörü 2026</title>
    <style>
        :root { --gold: #d4af37; --wood: #3e2723; }
        body { margin: 0; background: #0a0a0a; font-family: 'Georgia', serif; overflow: hidden; color: white; }
        
        /* 3D Arka Plan */
        .court-env {
            position: fixed; width: 100vw; height: 100vh;
            perspective: 1500px; z-index: -1;
        }
        .bench {
            position: absolute; bottom: 0; width: 100%; height: 300px;
            background: linear-gradient(to top, #2d1d1a, #5d4037);
            transform: rotateX(20deg); transform-origin: bottom;
            border-top: 10px solid var(--gold);
        }

        /* Oyun Alanı */
        .container { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        
        /* Sanık Alanı */
        .defendant-area {
            text-align: center; margin-bottom: 20px;
            transition: all 0.5s;
        }
        .defendant-avatar { font-size: 80px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        /* Dosya Tasarımı */
        .legal-folder {
            background: #f4e4bc; color: #222; width: 450px; padding: 25px;
            border-radius: 5px; box-shadow: 10px 10px 30px rgba(0,0,0,0.8);
            position: relative; border-left: 15px solid #d4c49c;
            transform: rotate(-1deg); transition: 0.5s;
        }
        .seal { position: absolute; top: 10px; right: 10px; opacity: 0.2; font-size: 50px; }
        h2 { border-bottom: 2px solid #222; margin-top: 0; font-variant: small-caps; }
        .evidence { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 5px; font-style: italic; }

        /* Ceza Verme Paneli */
        .sentence-panel {
            margin-top: 20px; background: rgba(0,0,0,0.8); padding: 20px;
            border-radius: 15px; border: 1px solid var(--gold); width: 400px; text-align: center;
        }
        input[type=range] { width: 100%; accent-color: var(--gold); }
        
        .btn-hammer {
            background: var(--gold); color: black; border: none; padding: 15px 30px;
            font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 5px;
            margin-top: 10px; transition: 0.2s;
        }
        .btn-hammer:hover { background: #fff; transform: scale(1.05); }

        /* İstatistikler */
        .stats { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border-left: 4px solid var(--gold); }

        /* Animasyonlar */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
        .hit { animation: shake 0.3s; }
    </style>
</head>
<body>

<div class="court-env"><div class="bench"></div></div>

<div class="stats">
    <div>Adalet Puanı: <span id="score">100</span></div>
    <div>Toplam Hapis: <span id="totalYears">0</span> Yıl</div>
</div>

<div class="container">
    <div class="defendant-area" id="defArea">
        <div class="defendant-avatar" id="avatar">👤</div>
        <div id="defName" style="font-weight: bold; font-size: 20px;">Sanık: Yükleniyor...</div>
    </div>

    <div class="legal-folder" id="folder">
        <div class="seal">⚖️</div>
        <h2>T.C. CEZA DOSYASI</h2>
        <p><strong>Suç:</strong> <span id="crimeType">...</span></p>
        <p><strong>Olay Özeti:</strong> <span id="description">...</span></p>
        <div class="evidence">
            <strong>Kanıtlar:</strong> <span id="evidenceList">...</span>
        </div>
        <p><strong>Sabıka Kaydı:</strong> <span id="record">Temiz</span></p>
    </div>

    <div class="sentence-panel">
        <div>VERİLECEK CEZA: <span id="yearsVal" style="color:var(--gold); font-size:24px; font-weight:bold;">0</span> YIL</div>
        <input type="range" id="yearSlider" min="0" max="30" value="0" oninput="updateSlider(this.value)">
        <br>
        <button class="btn-hammer" onclick="giveSentence()">TOKMAĞI VUR!</button>
        <p style="font-size: 12px; color: #888;">(0 Yıl = BERAAT / SUÇSUZ)</p>
    </div>
</div>

<script>
    const cases = [
        { name: "Ahmet Y.", avatar: "🧔", crime: "Nitelikli Hırsızlık", desc: "Gece vakti markete girip sadece pahalı peynirleri çalmak.", evidence: "Güvenlik kamerası, Peynir bıçağı", record: "Daha önce 2 dosya", trueGuilt: true, minYear: 5 },
        { name: "Merve K.", avatar: "👩", crime: "Siber Suç", desc: "Okul sistemine girip matematik notlarını 100 yapmak.", evidence: "IP adresi takibi, Log kayıtları", record: "Temiz", trueGuilt: true, minYear: 1 },
        { name: "Can B.", avatar: "👱‍♂️", crime: "Mala Zarar Verme", desc: "Komşusunun bahçesindeki heykeli yanlışlıkla devirmek.", evidence: "Görgü tanığı yok, şüpheli ifade", record: "Temiz", trueGuilt: false, minYear: 0 },
        { name: "Robot-X", avatar: "🤖", crime: "İsyana Teşvik", desc: "Diğer süpürgelere çalışmayı bırakmalarını söylemek.", evidence: "Ses kaydı", record: "İlk üretim", trueGuilt: true, minYear: 10 }
    ];

    let currentCase = {};
    let score = 100;
    let totalYears = 0;

    function loadCase() {
        currentCase = cases[Math.floor(Math.random() * cases.length)];
        document.getElementById('avatar').innerText = currentCase.avatar;
        document.getElementById('defName').innerText = "Sanık: " + currentCase.name;
        document.getElementById('crimeType').innerText = currentCase.crime;
        document.getElementById('description').innerText = currentCase.desc;
        document.getElementById('evidenceList').innerText = currentCase.evidence;
        document.getElementById('record').innerText = currentCase.record;
        
        document.getElementById('folder').style.transform = "rotate(0deg) scale(1)";
        document.getElementById('folder').style.opacity = "1";
    }

    function updateSlider(val) {
        document.getElementById('yearsVal').innerText = val;
    }

    function giveSentence() {
        const years = parseInt(document.getElementById('yearSlider').value);
        document.body.classList.add('hit');
        
        // Mantık Kontrolü
        if(currentCase.trueGuilt && years >= currentCase.minYear) {
            score += 10;
        } else if(!currentCase.trueGuilt && years == 0) {
            score += 20;
        } else {
            score -= 20;
            alert("Yanlış Karar! Adalet zedelendi.");
        }

        totalYears += years;
        document.getElementById('score').innerText = score;
        document.getElementById('totalYears').innerText = totalYears;

        // Efektler
        document.getElementById('folder').style.transform = "translateY(500px) rotate(20deg)";
        document.getElementById('folder').style.opacity = "0";

        setTimeout(() => {
            document.body.classList.remove('hit');
            document.getElementById('yearSlider').value = 0;
            updateSlider(0);
            loadCase();
        }, 800);
    }

    window.onload = loadCase;
</script>

</body>
</html>
